<form>
    <div class="form-group">
        <label for="figureNameId">Figure Name</label>
        <input type="text" id="figureNameId" [(ngModel)]="figureName" name="figureNameName"
        placeholder="Make sure this name is globaly unique" class="form-control">
    </div>
    <div class="form-group">
        <label for="baseNameId">Base Name</label>
        <input type="text" id="baseNameId" value="{{ figureName }}"
        placeholder="This name is used to create the official name" class="form-control">
    </div>
    <div class="form-group">
        
    </div>
    <div class="form-group">
        <label for="baseNameId">Price</label>
        <input type="number" class="form-control">
    </div>
</form>

<div class="row">
	<div class="col">
		<div ngbDropdown class="d-inline-block">
			<button type="button" class="btn btn-outline-primary" id="dropdownBasic1" ngbDropdownToggle>
				Toggle dropdown
			</button>
			<div ngbDropdownMenu aria-labelledby="dropdownBasic1">
				<button ngbDropdownItem>Action - 1</button>
				<button ngbDropdownItem>Another Action</button>
				<button ngbDropdownItem>Something else is here</button>
			</div>
		</div>
	</div>

	<div class="col text-end">
		<div ngbDropdown placement="top-end" class="d-inline-block">
			<button type="button" class="btn btn-outline-primary" id="dropdownBasic2" ngbDropdownToggle>Toggle dropup</button>
			<div ngbDropdownMenu aria-labelledby="dropdownBasic2">
				<button ngbDropdownItem>Action - 1</button>
				<button ngbDropdownItem>Another Action</button>
				<button ngbDropdownItem>Something else is here</button>
			</div>
		</div>
	</div>
</div>
